<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <marker id="dn" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
    <marker id="opt" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1d4ed8"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="16" fill="url(#bg2)"/>

  <!-- ══════════════════════════════════════════════════════════════
       SECTION LABEL: Entry Points
  ══════════════════════════════════════════════════════════════ -->
  <text x="20" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600"
        fill="#475569" letter-spacing="2">ENTRY POINTS</text>

  <!-- CLI box -->
  <rect x="60" y="30" width="230" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="56" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12.5" font-weight="600" fill="#f1f5f9">claudegen run / graph</text>
  <text x="175" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#64748b">CLI — click + rich progress bars</text>
  <text x="175" y="87" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#3b82f6" font-style="italic">claudegen/cli.py</text>

  <!-- Web UI box -->
  <rect x="510" y="30" width="230" height="70" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="625" y="56" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12.5" font-weight="600" fill="#f1f5f9">claudegen ui</text>
  <text x="625" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#64748b">Web UI — Gradio, live log stream</text>
  <text x="625" y="87" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#818cf8" font-style="italic">claudegen/ui.py</text>

  <!-- Connector lines from entry points down to core package -->
  <line x1="175" y1="100" x2="175" y2="128" stroke="#334155" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="625" y1="100" x2="625" y2="128" stroke="#334155" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="175" y1="114" x2="625" y2="114" stroke="#334155" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ══════════════════════════════════════════════════════════════
       SECTION LABEL: Core Package
  ══════════════════════════════════════════════════════════════ -->
  <text x="20" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600"
        fill="#475569" letter-spacing="2">CORE PACKAGE</text>

  <!-- Core package container -->
  <rect x="16" y="155" width="768" height="120" rx="10" fill="#0f1929" stroke="#1e293b" stroke-width="1.5"/>

  <!-- RepoIngester -->
  <rect x="32" y="168" width="168" height="90" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="116" y="191" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#f1f5f9">RepoIngester</text>
  <text x="116" y="207" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">File scanning</text>
  <text x="116" y="221" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Manifest parsing</text>
  <text x="116" y="235" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Framework detection</text>
  <text x="116" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="8.5" fill="#818cf8" font-style="italic">ingestion.py</text>

  <!-- DependencyGraph -->
  <rect x="216" y="168" width="168" height="90" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="300" y="191" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#f1f5f9">DependencyGraph</text>
  <text x="300" y="207" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">AST import parsing</text>
  <text x="300" y="221" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Cycle detection</text>
  <text x="300" y="235" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">D3 HTML export</text>
  <text x="300" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="8.5" fill="#a78bfa" font-style="italic">graph.py</text>

  <!-- VoiceTranscriber (dashed = optional) -->
  <rect x="400" y="168" width="168" height="90" rx="8" fill="#1e293b" stroke="#0891b2" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="484" y="191" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#f1f5f9">VoiceTranscriber</text>
  <text x="484" y="203" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="8.5" fill="#22d3ee">optional</text>
  <text x="484" y="219" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">faster-whisper</text>
  <text x="484" y="233" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Local CPU only</text>
  <text x="484" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="8.5" fill="#67e8f9" font-style="italic">voice.py</text>

  <!-- ClaudeSynthesizer -->
  <rect x="584" y="168" width="168" height="90" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1"/>
  <text x="668" y="191" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#f1f5f9">ClaudeSynthesizer</text>
  <text x="668" y="207" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Template mode</text>
  <text x="668" y="221" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">LLM via OpenRouter</text>
  <text x="668" y="235" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Token budget cap</text>
  <text x="668" y="250" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="8.5" fill="#34d399" font-style="italic">synthesis.py</text>

  <!-- ══════════════════════════════════════════════════════════════
       CONNECTOR: core → outputs
  ══════════════════════════════════════════════════════════════ -->
  <line x1="400" y1="275" x2="400" y2="302" stroke="#334155" stroke-width="1.2" marker-end="url(#dn)"/>
  <!-- fan out -->
  <line x1="156" y1="298" x2="644" y2="298" stroke="#334155" stroke-width="0.8"/>
  <line x1="156" y1="298" x2="156" y2="310" stroke="#334155" stroke-width="1" marker-end="url(#dn)"/>
  <line x1="400" y1="298" x2="400" y2="310" stroke="#334155" stroke-width="1" marker-end="url(#dn)"/>
  <line x1="644" y1="298" x2="644" y2="310" stroke="#0e4e8a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#opt)"/>

  <!-- ══════════════════════════════════════════════════════════════
       SECTION LABEL: Outputs
  ══════════════════════════════════════════════════════════════ -->
  <text x="20" y="299" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600"
        fill="#475569" letter-spacing="2">OUTPUTS</text>

  <!-- CLAUDE.md -->
  <rect x="56" y="310" width="200" height="56" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  <text x="156" y="334" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#fbbf24">CLAUDE.md</text>
  <text x="156" y="353" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#a8a29e">AI agent context file</text>

  <!-- dependency-graph -->
  <rect x="300" y="310" width="200" height="56" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="400" y="332" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#cbd5e1">dependency-graph</text>
  <text x="400" y="347" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#64748b">.html &amp; .json</text>
  <text x="400" y="359" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Interactive D3 graph</text>

  <!-- voice-notes.txt (optional) -->
  <rect x="544" y="310" width="200" height="56" rx="8" fill="#1e293b" stroke="#0891b2" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="644" y="332" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#cbd5e1">voice-notes.txt</text>
  <text x="644" y="347" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#0891b2">optional</text>
  <text x="644" y="361" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" fill="#94a3b8">Whisper transcript</text>

  <!-- Legend: dashed = optional -->
  <line x1="30" y1="363" x2="50" y2="363" stroke="#334155" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="55" y="367" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#475569">= optional</text>
</svg>
